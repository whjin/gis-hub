name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 全局环境变量：强制所有Action使用Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install PNPM
        uses: pnpm/action-setup@v5 # ✅ 升级到v5，原生支持Node.js 24
        with:
          version: 11.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: wuhuajin.com # 你的自定义域名
          keep_files: false
          force_orphan: true # 强制创建孤儿分支，避免历史冲突