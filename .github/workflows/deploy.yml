name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 全局环境变量：强制所有Action使用Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 显式指定pnpm路径（可选，增强稳定性）
  PNPM_HOME: ~/pnpm
  PATH: ~/pnpm:$PATH

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.16.0'
          cache: 'pnpm'
          # 启用corepack（Node.js 16+内置，可管理pnpm/yarn）
          corepack: true

      - name: Install PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 11.6.0
          run_install: false
          # 显式指定安装目录（与全局PNPM_HOME一致）
          dest: ~/pnpm

      - name: 验证pnpm安装（调试用，可选）
        run: |
          pnpm --version # 输出版本号则说明安装成功
          echo "PNPM路径: $(which pnpm)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: wuhuajin.com
          keep_files: false
          force_orphan: true