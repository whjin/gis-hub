name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 先安装 PNPM（关键步骤，之前缺失）
      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 2. 升级到 Node.js 24（解决弃用警告）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'  # 现在可以正常使用pnpm缓存

      # 3. 安装依赖（严格模式）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 构建项目
      - name: Build project
        run: pnpm run build

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: whjin.com  # 自动设置你的自定义域名
          keep_files: false  # 完全覆盖旧文件，避免残留