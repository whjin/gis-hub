name: Deploy Node.js Project

on:
  push:
    branches:
      - main # 你可以根据需要修改分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 或者使用 windows-latest, macos-latest 根据你的需求

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '24.16.0' # 设置Node.js版本

      - name: Set up pnpm
        run: npm install -g pnpm@11.6.0 # 安装指定版本的pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # 使用pnpm安装依赖，确保使用pnpm-lock.yaml文件

      - name: Build project
        run: pnpm run build # 假设你的构建命令是pnpm run build

      - name: Deploy to server or another step
        # 这里可以添加部署的步骤，例如使用SSH部署、FTP上传等
        run: echo "Deploying to server..." # 示例命令，根据实际情况修改
