name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # ✅ 升级到原生支持Node.js 24的版本

      - name: Setup Node.js
        uses: actions/setup-node@v5 # ✅ 升级到原生支持Node.js 24的版本
        with:
          node-version: '24.16.0'

      - name: Install PNPM
        uses: pnpm/action-setup@v4 # ✅ 官方推荐的pnpm安装方式，比npm install更高效
        with:
          version: 11.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: wuhuajin.com # 自动设置你的自定义域名
          keep_files: false